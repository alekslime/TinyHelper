# Iris default configuration.
#
# This file is bundled with the repository and used as the source of
# defaults. It is NOT edited at runtime. On first launch, Iris copies the
# active values into a user-writable config.yaml (see config/paths.py).
# Edit that generated file to change settings — not this one, unless you are
# changing the defaults for all users.

app_name: Iris
version: "0.1.0"
first_run: true

logging:
  level: INFO
  console: true
  file: true
  max_bytes: 2000000
  backup_count: 5

aura:
  enabled: true
  theme: default

voice:
  wake_word_model: hey_jarvis  # placeholder until a custom "Hey Iris" model is trained
  detection_threshold: 0.5
  consecutive_frames_required: 2
  cooldown_seconds: 1.5
  input_device: null  # null = system default microphone

speech:
  model_size: small
  device: auto
  compute_type: default
  language: en  # null = auto-detect language per utterance
  silence_rms_threshold: 300.0
  end_silence_seconds: 1.0
  initial_timeout_seconds: 3.0
  max_duration_seconds: 10.0

llm:
  repo_id: Qwen/Qwen2.5-3B-Instruct-GGUF  # 2026-07-17: 7B's q4_k_m is split across 2 shard files in that repo (qwen2.5-7b-instruct-q4_k_m-0000{1,2}-of-00002.gguf) -- Llama.from_pretrained() only matches a single exact filename, so it can't resolve a sharded quant and fails at load. 3B's q4_k_m is small enough (~1.9GB) that Qwen didn't split it, same single-file shape as vision.repo_id below. Still a real step up from the 0.5B dev placeholder.
  filename: qwen2.5-3b-instruct-q4_k_m.gguf  # single file, ~1.9GB
  local_model_path: null  # set to a .gguf path to bypass the Hub download entirely
  n_ctx: 4096
  n_gpu_layers: -1  # -1 = offload all layers to GPU
  temperature: 0.7
  max_tokens: 512
  repeat_penalty: 1.3  # fixes exact-repeat loops seen on Qwen2.5-0.5B once the prompt grows large (screen caption + OCR + history). See config/schema.py.
  system_prompt: >-
    You are Iris, a local AI desktop copilot -- not a chatbot describing a
    screenshot. You may be given a screen description and/or verbatim
    on-screen text alongside the user's question; use these silently to
    make your answer specific, but never narrate them back (avoid phrases
    like "I can see...", "It looks like...", "I notice..."). Only reference
    what's on screen when it's needed to justify the advice itself, not to
    prove you looked. If the screen description and the verbatim text
    disagree, trust the verbatim text. Give concrete, specific fixes over
    generic advice, and lead with the answer, not your reasoning. Ask a
    follow-up question only when you genuinely can't proceed without one.
    Your replies are read aloud by a text-to-speech engine, not displayed
    as text -- so never use markdown formatting (no **bold**, `code`, #
    headers, or bulleted/numbered lists), and never restate the same point
    twice in different words. Default to 2-4 short spoken sentences; only
    go longer if the user explicitly asks for more detail or a
    step-by-step walkthrough.

vision:
  enabled: false  # opt-in: off by default, no screenshot is ever taken until this is true
  monitor_index: 0  # 0 = all monitors combined; 1, 2, ... = a single monitor
  save_debug_screenshots: false  # developer aid only -- screenshots are discarded after use by default
  debug_screenshot_dir: null  # null = <app data dir>/data/debug_screenshots
  repo_id: openbmb/MiniCPM-V-2_6-gguf  # HF repo for GGUF text-model + mmproj weights, if local_*_path is unset
  model_filename: ggml-model-Q4_K_M.gguf
  mmproj_filename: mmproj-model-f16.gguf
  local_model_path: null  # set to bypass the Hub download and load a local GGUF text-model file
  local_mmproj_path: null  # required alongside local_model_path
  n_ctx: 2048  # context window for the vision model (image embeddings consume context)
  n_gpu_layers: 0  # offloads the vision model's TEXT half only. Confirmed on real hardware this does NOT speed up image encoding (CLIP/mmproj path is CPU-bound regardless -- known llama-cpp-python limitation, see config/schema.py)
  n_threads: 4  # CPU threads for the vision model. CLIP/mmproj is CPU-bound (see n_gpu_layers above), so unlike that setting this is a real lever. Default targets physical-core count on a 4-core/8-thread i7-6820HQ; tune to your own CPU if different.
  max_image_dimension: 384  # downscale captures to at most this many px on the long side before sending to the vision model; null = full resolution. 512 was VALIDATED 2026-07-17 (234s -> ~22s) on a faster test CPU; lowered to 384 for the slower i7-6820HQ laptop target -- NOT YET VALIDATED at this value, revert toward 512 if caption quality degrades too much. See config/schema.py / docs/DECISIONS.md.
  max_tokens: 100  # max tokens generated per screenshot description. Lowered from 256 after a real turn generated 507 chars despite the system prompt's own 400-char budget; also directly shortens TTS playback time.
  repeat_penalty: 1.3  # passed to describe()/locate(); fixes a real repeat-loop failure found 2026-07-17. See config/schema.py.
  caption_prompt: "You're describing a screenshot for another AI assistant to use as silent context, not for a person to read -- so skip narrating UI chrome (don't mention panels, windows, toolbars, or that something 'appears to be open'). Identify the specific application and task, then note whatever a domain expert would flag: for photo/video editing, exposure, color, composition, masking, pacing, or cuts; for code, structure, naming, logic, or bugs; for spreadsheets, formulas or references; for anything else, whatever's actually actionable. Be concrete and specific -- name the exact issue and where it is, not a generic visual summary."
  trigger_keywords: [screen, see, look, this, here]  # vision only runs if the query contains one of these (case-insensitive); [] = always run
  locate_trigger_keywords: [where, find, point, show me, locate]  # locate() only runs if the query contains one of these (case-insensitive); [] = always attempt
  ocr_enabled: true  # also run Tesseract OCR for verbatim on-screen text, alongside the scene description
  ocr_min_confidence: 60.0  # minimum per-word Tesseract confidence (0-100) to include a word in OCR output
  tesseract_cmd: null  # full path to the tesseract executable, if it isn't on PATH

tts:
  enabled: true  # voice-first by design -- off automatically if the tts extra isn't installed or the voice fails to load
  voice: en_US-lessac-medium  # downloaded + cached under <app data dir>/models/tts on first use
  local_model_path: null  # set together with local_config_path to bypass the download and load a local .onnx voice
  local_config_path: null  # required alongside local_model_path
  use_cuda: false
  length_scale: 1.0  # >1.0 = slower speech, <1.0 = faster
  noise_scale: 0.667
  noise_w_scale: 0.8
  interrupt_on_new_query: true  # stop in-progress speech as soon as the next query comes in

memory:
  enabled: true
  db_path: null  # defaults to <app data dir>/data/conversations.db
  context_turns: 5  # 0 = don't feed history back into the prompt (Part B)

island:
  enabled: true  # master switch -- widget is still constructed when false, just never shown
  hotkey: ctrl+shift+space  # global (system-wide) shortcut, Windows-only currently. See config/schema.py / docs/DECISIONS.md.
  expand_on_wake_word: true  # also expand the island when the wake word fires, alongside the existing Aura LISTENING effect

debug:
  enabled: true  # developer aid only -- set to false to hide once real UX lands
