# Iris default configuration.
#
# This file is bundled with the repository and used as the source of
# defaults. It is NOT edited at runtime. On first launch, Iris copies the
# active values into a user-writable config.yaml (see config/paths.py).
# Edit that generated file to change settings — not this one, unless you are
# changing the defaults for all users.

app_name: Iris
version: "0.1.0"
first_run: true

logging:
  level: INFO
  console: true
  file: true
  max_bytes: 2000000
  backup_count: 5

aura:
  enabled: true
  theme: default

voice:
  wake_word_model: hey_jarvis  # placeholder until a custom "Hey Iris" model is trained
  detection_threshold: 0.5
  consecutive_frames_required: 2
  cooldown_seconds: 1.5
  input_device: null  # null = system default microphone

speech:
  model_size: small
  device: auto
  compute_type: default
  language: en  # null = auto-detect language per utterance
  silence_rms_threshold: 300.0
  end_silence_seconds: 1.0
  initial_timeout_seconds: 3.0
  max_duration_seconds: 10.0

llm:
  repo_id: Qwen/Qwen2.5-0.5B-Instruct-GGUF  # small model for fast dev-machine iteration
  filename: qwen2.5-0.5b-instruct-q4_k_m.gguf
  local_model_path: null  # set to a .gguf path to bypass the Hub download entirely
  n_ctx: 4096
  n_gpu_layers: -1  # -1 = offload all layers to GPU
  temperature: 0.7
  max_tokens: 512
  system_prompt: >-
    You are Iris, a concise local AI desktop copilot. Keep answers short
    and to the point unless the user asks for more detail.

vision:
  enabled: false  # opt-in: off by default, no screenshot is ever taken until this is true
  monitor_index: 0  # 0 = all monitors combined; 1, 2, ... = a single monitor
  save_debug_screenshots: false  # developer aid only -- screenshots are discarded after use by default
  debug_screenshot_dir: null  # null = <app data dir>/data/debug_screenshots
  repo_id: moondream/moondream2-gguf  # HF repo for GGUF text-model + mmproj weights, if local_*_path is unset
  model_filename: moondream2-text-model-f16.gguf
  mmproj_filename: moondream2-mmproj-f16.gguf
  local_model_path: null  # set to bypass the Hub download and load a local GGUF text-model file
  local_mmproj_path: null  # required alongside local_model_path
  n_ctx: 2048  # context window for the vision model (image embeddings consume context)
  n_gpu_layers: 0  # GPU layers to offload for the vision model's text half. -1 = all
  max_tokens: 256  # max tokens generated per screenshot description
  caption_prompt: "Describe what's on this screen concisely, focusing on any visible application windows, UI elements, and what the user appears to be doing."
  trigger_keywords: [screen, see, look, this, here]  # vision only runs if the query contains one of these (case-insensitive); [] = always run
  locate_trigger_keywords: [where, find, point, show me, locate]  # locate() only runs if the query contains one of these (case-insensitive); [] = always attempt
  ocr_enabled: true  # also run Tesseract OCR for verbatim on-screen text, alongside the scene description
  ocr_min_confidence: 60.0  # minimum per-word Tesseract confidence (0-100) to include a word in OCR output
  tesseract_cmd: null  # full path to the tesseract executable, if it isn't on PATH

tts:
  enabled: true  # voice-first by design -- off automatically if the tts extra isn't installed or the voice fails to load
  voice: en_US-lessac-medium  # downloaded + cached under <app data dir>/models/tts on first use
  local_model_path: null  # set together with local_config_path to bypass the download and load a local .onnx voice
  local_config_path: null  # required alongside local_model_path
  use_cuda: false
  length_scale: 1.0  # >1.0 = slower speech, <1.0 = faster
  noise_scale: 0.667
  noise_w_scale: 0.8
  interrupt_on_new_query: true  # stop in-progress speech as soon as the next query comes in

memory:
  enabled: true
  db_path: null  # defaults to <app data dir>/data/conversations.db
  context_turns: 5  # 0 = don't feed history back into the prompt (Part B)

debug:
  enabled: true  # developer aid only -- set to false to hide once real UX lands
