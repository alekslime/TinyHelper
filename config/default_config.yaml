# Iris default configuration.
#
# This file is bundled with the repository and used as the source of
# defaults. It is NOT edited at runtime. On first launch, Iris copies the
# active values into a user-writable config.yaml (see config/paths.py).
# Edit that generated file to change settings — not this one, unless you are
# changing the defaults for all users.

app_name: Iris
version: "0.1.0"
first_run: true

logging:
  level: INFO
  console: true
  file: true
  max_bytes: 2000000
  backup_count: 5

aura:
  enabled: true
  theme: default

voice:
  wake_word_model: hey_jarvis  # placeholder until a custom "Hey Iris" model is trained
  detection_threshold: 0.5
  consecutive_frames_required: 2
  cooldown_seconds: 1.5
  input_device: null  # null = system default microphone

speech:
  model_size: small
  device: auto
  compute_type: default
  language: en  # null = auto-detect language per utterance
  silence_rms_threshold: 300.0
  end_silence_seconds: 1.0
  initial_timeout_seconds: 3.0
  max_duration_seconds: 10.0

llm:
  repo_id: Qwen/Qwen2.5-0.5B-Instruct-GGUF  # small model for fast dev-machine iteration
  filename: qwen2.5-0.5b-instruct-q4_k_m.gguf
  local_model_path: null  # set to a .gguf path to bypass the Hub download entirely
  n_ctx: 4096
  n_gpu_layers: -1  # -1 = offload all layers to GPU
  temperature: 0.7
  max_tokens: 512
  system_prompt: >-
    You are Iris, a concise local AI desktop copilot. Keep answers short
    and to the point unless the user asks for more detail.

vision:
  enabled: false  # opt-in: off by default, no screenshot is ever taken until this is true
  monitor_index: 0  # 0 = all monitors combined; 1, 2, ... = a single monitor
  save_debug_screenshots: false  # developer aid only -- screenshots are discarded after use by default
  debug_screenshot_dir: null  # null = <app data dir>/data/debug_screenshots
