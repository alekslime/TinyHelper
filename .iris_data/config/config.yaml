app_name: Iris
version: 0.1.0
first_run: true
logging:
  level: INFO
  console: true
  file: true
  max_bytes: 2000000
  backup_count: 5
aura:
  enabled: true
  theme: default
voice:
  wake_word_model: hey_jarvis
  detection_threshold: 0.5
  consecutive_frames_required: 2
  cooldown_seconds: 1.5
  input_device: null
speech:
  model_size: small
  device: auto
  compute_type: default
  language: en
  silence_rms_threshold: 300.0
  end_silence_seconds: 1.0
  initial_timeout_seconds: 3.0
  max_duration_seconds: 10.0
llm:
  repo_id: Qwen/Qwen2.5-0.5B-Instruct-GGUF
  filename: qwen2.5-0.5b-instruct-q4_k_m.gguf
  local_model_path: null
  n_ctx: 4096
  n_gpu_layers: -1
  temperature: 0.7
  max_tokens: 512
  system_prompt: >-
    You are Iris, a local AI desktop copilot -- not a chatbot describing a
    screenshot. You may be given a screen description and/or verbatim
    on-screen text alongside the user's question; use these silently to
    make your answer specific, but never narrate them back (avoid phrases
    like "I can see...", "It looks like...", "I notice..."). Only reference
    what's on screen when it's needed to justify the advice itself, not to
    prove you looked. If the screen description and the verbatim text
    disagree, trust the verbatim text. Give concrete, specific fixes over
    generic advice, and lead with the answer, not your reasoning. Ask a
    follow-up question only when you genuinely can't proceed without one.
    Your replies are read aloud by a text-to-speech engine, not displayed
    as text -- so never use markdown formatting (no **bold**, `code`, #
    headers, or bulleted/numbered lists), and never restate the same point
    twice in different words. Default to 2-4 short spoken sentences; only
    go longer if the user explicitly asks for more detail or a
    step-by-step walkthrough.
vision:
  enabled: false
  monitor_index: 0
  save_debug_screenshots: false
  debug_screenshot_dir: null
  repo_id: openbmb/MiniCPM-V-2_6-gguf
  model_filename: ggml-model-Q4_K_M.gguf
  mmproj_filename: mmproj-model-f16.gguf
  local_model_path: null
  local_mmproj_path: null
  n_ctx: 2048
  n_gpu_layers: 0
  n_threads: 4
  max_image_dimension: 384
  max_tokens: 100
  caption_prompt: >-
    You're describing a screenshot for another AI assistant to use as
    silent context, not for a person to read -- so skip narrating UI
    chrome (don't mention panels, windows, toolbars, or that something
    'appears to be open'). Identify the specific application and task,
    then note whatever a domain expert would flag: for photo/video
    editing, exposure, color, composition, masking, pacing, or cuts; for
    code, structure, naming, logic, or bugs; for spreadsheets, formulas or
    references; for anything else, whatever's actually actionable. Be
    concrete and specific -- name the exact issue and where it is, not a
    generic visual summary.
  trigger_keywords:
  - screen
  - see
  - look
  - this
  - here
  locate_trigger_keywords:
  - where
  - find
  - point
  - show me
  - locate
  ocr_enabled: true
  ocr_min_confidence: 60.0
  tesseract_cmd: null
debug:
  enabled: true
